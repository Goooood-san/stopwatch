<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>AtomNyan Stopwatch</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#111111" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="STOPWATCH" />

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #111;
  color: white;
  font-family: sans-serif;
  touch-action: manipulation;
}

body {
  position: fixed;
}

.screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
}

.screen.active {
  display: flex;
}

.status-bar {
  height: 22px;
  background: #c00000;
  transition: 0.15s;
}

.status-bar.ready {
  background: #00cc33;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  gap: 20px;
}

.time {
  font-size: min(22vw, 140px);
  font-weight: bold;
}

.message {
  font-size: min(5vw, 28px);
  text-align: center;
}

.button-row {
  display: flex;
  gap: 12px;
}

button {
  border: none;
  border-radius: 14px;
  background: #2b2b2b;
  color: white;
  padding: 14px 22px;
  font-size: 18px;
  font-weight: bold;
}

button:active {
  transform: scale(0.96);
}

.history-header {
  padding-top: calc(env(safe-area-inset-top) + 10px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  border-bottom: 1px solid #333;
}

.history-title {
  font-size: 28px;
  font-weight: bold;
}

.history-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 16px 100px;
}

.record {
  display: flex;
  justify-content: center;
  gap: 60px;
  padding: 14px 40px;
  border-bottom: 1px solid #333;
  font-size: 24px;
  text-align: center;
}

.footer {
  padding-bottom: calc(env(safe-area-inset-bottom) + 14px);
  padding: 14px;
  border-top: 1px solid #333;
}
</style>
</head>
<body>

<div class="screen active" id="stopwatchScreen">
  <div class="status-bar" id="statusBar"></div>

  <div class="main">
    <div class="time" id="timeDisplay">0.000</div>

    <div class="message" id="message">
      両手で画面をタッチしてください
    </div>

    <div class="button-row">
      <button id="historyButton">履歴</button>
    </div>
  </div>
</div>

<div class="screen" id="historyScreen">
  <div class="history-header">
    <div class="history-title">履歴</div>
    <button id="backButton">戻る</button>
  </div>

  <div class="history-list" id="historyList"></div>

  <div class="footer">
    <button id="clearButton">履歴をクリア</button>
  </div>
</div>

<script>
const stopwatchScreen = document.getElementById('stopwatchScreen');
const historyScreen = document.getElementById('historyScreen');
const statusBar = document.getElementById('statusBar');
const timeDisplay = document.getElementById('timeDisplay');
const message = document.getElementById('message');
const historyList = document.getElementById('historyList');
const historyButton = document.getElementById('historyButton');
const backButton = document.getElementById('backButton');
const clearButton = document.getElementById('clearButton');

let timerRunning = false;
let armed = false;
let startTime = 0;
let animationFrame;
let recordCount = 0;
let audioContext;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}

function getAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioContext.state === 'suspended') {
    audioContext.resume();
  }

  return audioContext;
}

function beep(freq, duration) {
  const ctx = getAudio();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.frequency.value = freq;
  osc.type = 'square';

  osc.connect(gain);
  gain.connect(ctx.destination);

  gain.gain.setValueAtTime(0.2, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration / 1000);

  osc.start();
  osc.stop(ctx.currentTime + duration / 1000);
}

function format(ms) {
  return (ms / 1000).toFixed(3);
}

function updateTimer() {
  if (!timerRunning) return;

  const elapsed = performance.now() - startTime;
  timeDisplay.textContent = format(elapsed);

  animationFrame = requestAnimationFrame(updateTimer);
}

function startTimer() {
  timerRunning = true;
  armed = false;

  startTime = performance.now();
  message.textContent = '計測中';

  beep(1200, 100);

  updateTimer();
}

function stopTimer() {
  timerRunning = false;
  cancelAnimationFrame(animationFrame);

  const elapsed = performance.now() - startTime;
  const formatted = format(elapsed);

  timeDisplay.textContent = formatted;

  beep(700, 180);

  recordCount++;

  const row = document.createElement('div');
  row.className = 'record';
  row.innerHTML = `
    <span>${recordCount}</span>
    <span>${formatted} 秒</span>
  `;

  historyList.prepend(row);

  message.textContent = '両手でタッチしてください';
}

function validTwoHandTouch(touches) {
  if (touches.length < 2) return false;

  let left = false;
  let right = false;

  for (let i = 0; i < touches.length; i++) {
    if (touches[i].clientX < window.innerWidth / 2) {
      left = true;
    } else {
      right = true;
    }
  }

  return left && right;
}

function showHistory() {
  stopwatchScreen.classList.remove('active');
  historyScreen.classList.add('active');
}

function showStopwatch() {
  historyScreen.classList.remove('active');
  stopwatchScreen.classList.add('active');
}

historyButton.addEventListener('click', (e) => {
  e.stopPropagation();
  showHistory();
});

backButton.addEventListener('click', (e) => {
  e.stopPropagation();
  showStopwatch();
});

clearButton.addEventListener('click', (e) => {
  e.stopPropagation();

  historyList.innerHTML = '';
  recordCount = 0;
});

document.addEventListener('touchstart', (e) => {
  getAudio();

  if (!stopwatchScreen.classList.contains('active')) return;

  const tag = e.target.tagName;
  if (tag === 'BUTTON') return;

  e.preventDefault();

  const ready = validTwoHandTouch(e.touches);

  if (!timerRunning && ready) {
    armed = true;
    statusBar.classList.add('ready');
    message.textContent = '手を離すとスタート';
  }

  if (timerRunning && ready) {
    stopTimer();
    statusBar.classList.add('ready');
  }
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (!stopwatchScreen.classList.contains('active')) return;

  const tag = e.target.tagName;
  if (tag === 'BUTTON') return;

  e.preventDefault();

  if (!validTwoHandTouch(e.touches)) {
    statusBar.classList.remove('ready');
  }

  if (armed && !timerRunning && e.touches.length === 0) {
    startTimer();
  }
}, { passive: false });

window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    window.scrollTo(0, 0);
  }, 50);
});
</script>

</body>
</html>
